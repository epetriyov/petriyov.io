# Production compose. На VPS репозиторий целиком синкается в /opt/petriyov.io
# при каждом деплое (rsync из GitHub Actions), там же собирается образ:
#   docker build -t petriyov.io:latest -t petriyov.io:sha-<коммит> .
# Реестр не используется. По умолчанию запускается petriyov.io:latest.
# Для отката создайте рядом .env с тегом нужного коммита (rsync его не трогает):
#   IMAGE_TAG=sha-<12 символов коммита>     # список: docker images petriyov.io
services:
  site:
    image: ${IMAGE:-petriyov.io}:${IMAGE_TAG:-latest}
    container_name: petriyov-site
    restart: unless-stopped
    command: ['caddy', 'run', '--config', '/etc/caddy/Caddyfile.prod', '--adapter', 'caddyfile']
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - caddy_data:/data # сертификаты Let's Encrypt — не удалять!
      - caddy_config:/config
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
