# Production compose. Живёт на VPS в /opt/petriyov.io/ — деплой сам привозит
# свежую копию этого файла при каждом запуске, руками его там не править.
# Образ собирается на GitHub-раннере и приезжает готовым по SSH
# (docker save → docker load); VPS ничего не собирает — важно: 1 CPU / 1 ГБ RAM.
# Реестр не используется, имя образа фиксированное: petriyov.io.
# Для отката создайте рядом .env с тегом нужного коммита:
#   IMAGE_TAG=sha-<12 символов коммита>     # список: docker images petriyov.io
services:
  site:
    image: petriyov.io:${IMAGE_TAG:-latest}
    container_name: petriyov-site
    restart: unless-stopped
    command: ['caddy', 'run', '--config', '/etc/caddy/Caddyfile.prod', '--adapter', 'caddyfile']
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - caddy_data:/data # сертификаты Let's Encrypt — не удалять!
      - caddy_config:/config
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
