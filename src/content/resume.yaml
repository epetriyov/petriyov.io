role: Engineering Manager · Head of Development
summary: >-
  Инженерный руководитель: 15+ лет в разработке, 10+ лет управления командами.
  Строю и масштабирую инженерные команды, процессы разработки и инженерную
  культуру — умею и запускать продукты с нуля в стартапах, и выстраивать
  масштабируемые процессы в корпорации. В Делимобиле прошёл путь от тимлида
  до руководителя управления клиентских интерфейсов.

experience:
  - company: Делимобиль
    title: Head of Mobile → Engineering Manager
    start: '2019'
    end: '2026'
    location: Москва
    points:
      - 'Вырос от Android Team Lead до руководителя управления клиентских интерфейсов: 3 мобильных приложения, 30+ продуктовых проектов, web и операционная панель; 12 млн пользователей. За период — DAU/MAU x3, Retention x2, Revenue x5.'
      - 'Масштабировал мобильную команду x3: нанял тимлидов и инженеров, выстроил карьерные треки и матрицу компетенций — текучесть <10%, eNPS >90%.'
      - Внедрил единые Delivery Flow и Release Train, автоматизировал CI/CD — 15+ продуктовых релизов в год.
      - Спроектировал SDUI-фреймворк — TTM новых фич и UI-экспериментов ниже в десятки раз; внедрил дизайн-систему (+30% к скорости разработки UI).
      - Запустил QA-автоматизацию (ферма устройств, UI-тесты) и мониторинг инженерных метрик — crash-free 99%, Tech Debt Index снижен до 10%.
      - 'Руководил кросскомандными проектами на 20+ человек: реалтайм-чаты с контакт-центром (NPS +20%, contact rate −30%), BLE-доступ к авто (обращения «не могу открыть» −70%), длительные аренды с доставкой (+25% выручки сегмента).'
      - Перевёл Anytime Prime и Guido из аутсорса в inhouse, создал библиотеку переиспользуемых модулей — −25% затрат на подрядчиков.
      - Запустил incident management chat и линии внутренней техподдержки — MTTR −50%; внедряю AI-assisted разработку (code review с ИИ, code intelligence assistant с RAG).
  - company: OZON
