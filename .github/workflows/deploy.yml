name: Deploy (build on VPS)

# Деплой ТОЛЬКО вручную: GitHub → Actions → «Deploy (build on VPS)» → Run workflow.
# Push в main ничего не деплоит.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync sources to VPS (tar over ssh)
        # не rsync: его нет на минимальных образах Ubuntu, а tar есть везде.
        # Каталог очищается (кроме .env) и наполняется заново — аналог rsync --delete.
        run: |
          tar -czf - --exclude='./.git' . \
            | ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
                set -euo pipefail
                mkdir -p /opt/petriyov.io
                cd /opt/petriyov.io
                find . -mindepth 1 -maxdepth 1 ! -name ".env" -exec rm -rf {} +
                tar -xzf -
              '

      - name: Build image on VPS and restart
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -euo pipefail
            cd /opt/petriyov.io
            # сборка ДО перезапуска: если она упадёт, старый контейнер продолжит работать
            docker build --pull \
              -t petriyov.io:latest \
              -t petriyov.io:${{ steps.meta.outputs.tag }} \
              .
            docker compose up -d
            # держим 5 последних sha-образов для отката, остальные удаляем
            docker images petriyov.io --format '{{.Tag}}' \
              | grep '^sha-' | tail -n +6 \
              | xargs -r -I{} docker rmi petriyov.io:{} || true
            docker image prune -f
          EOF

      - name: Smoke check
        run: |
          sleep 5
          curl -sSf -o /dev/null https://petriyov.io/ && echo "site is up"
