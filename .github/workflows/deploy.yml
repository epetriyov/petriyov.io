name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy (atomic)
        env:
          SSH: ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          RELEASE="/var/www/releases/$(date +%Y%m%d%H%M%S)"
          $SSH "mkdir -p $RELEASE"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" dist/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$RELEASE/"
          # атомарное переключение симлинка + очистка старых релизов (оставляем 5)
          $SSH "ln -sfn $RELEASE /var/www/petriyov.io && ls -dt /var/www/releases/* | tail -n +6 | xargs -r rm -rf"
