name: Deploy (build in CI)

# Деплой ТОЛЬКО вручную: GitHub → Actions → «Deploy (build in CI)» → Run workflow.
# Push в main ничего не деплоит.
#
# Сборка целиком идёт на GitHub-раннере: VPS слабый (1 CPU / 1 ГБ RAM / 10 ГБ диск),
# сборка на нём приводит к OOM. Сервер только принимает готовый образ по SSH
# (docker save → docker load, ~50 МБ сжатых) и перезапускает контейнер.
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  IMAGE: petriyov.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build image (on runner)
        run: docker build --pull -t "$IMAGE:${{ steps.meta.outputs.tag }}" -t "$IMAGE:latest" .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ship image to VPS (docker save → ssh → docker load)
        run: |
          docker save "$IMAGE:${{ steps.meta.outputs.tag }}" "$IMAGE:latest" \
            | gzip \
            | ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "docker load"

      - name: Restart container and prune old images
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -euo pipefail
            cd /opt/petriyov.io
            docker compose up -d
            # держим 5 последних sha-образов для отката, остальные удаляем
            docker images petriyov.io --format '{{.Tag}}' \
              | grep '^sha-' | tail -n +6 \
              | xargs -r -I{} docker rmi petriyov.io:{} || true
            docker image prune -f
          EOF

      - name: Smoke check
        run: |
          sleep 5
          curl -sSf -o /dev/null https://petriyov.io/ && echo "site is up"
